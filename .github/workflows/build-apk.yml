name: Build Android APK

on:
  push:
    branches: [ "**" ]
  workflow_dispatch:

jobs:
  build:
    name: Build Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Restore Debug Keystore
        run: |
          if [ -f debug.keystore.base64 ]; then
            echo "Restoring keystore..."
            base64 --decode debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 file not found!"
          fi

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        run: gradle :app:copyReleaseApk --no-daemon

      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MathLab-T2-Release-APK
          path: .build-outputs/app-release.apk
          if-no-files-found: error
